# vim:ft=kitty

## name: Custom Abyss Theme
## blurb: Dark oceanic palette with green/teal accents

# The basic colors
foreground              #d8c5a7   # sand
background              #112e2a   # abyss
selection_foreground    #ffffff   # ivory
selection_background    #1b413b   # shelf / veil

# Cursor colors
cursor                  #ffffff   # ivory
cursor_text_color       #112e2a   # abyss

# kitty window border colors
active_border_color     #2ea87e   # jade
inactive_border_color   #3b655d   # crest

# Tab bar colors
active_tab_foreground   #ffffff   # ivory
active_tab_background   #1b413b   # shelf
inactive_tab_foreground #8eaca5   # mist
inactive_tab_background #0b211d   # trench

# The basic 16 colors

# black
color0  #0b211d   # trench
color8  #3b655d   # crest

# red
color1  #F43841   # ember/scarlet
color9  #F43841   # same (no lighter variant provided)

# green
color2  #2ea87e   # jade
color10 #8cde94   # spring

# yellow
color3  #d8c5a7   # sand
color11 #c1d1e3   # frost (used as bright yellow alternative)

# blue
color4  #748a92   # slate
color12 #c1d1e3   # frost

# magenta
color5  #52756e   # harbor
color13 #8eaca5   # mist

# cyan
color6  #7ad0c6   # aqua
color14 #21d813   # moss (bright cyan alternative)

# white
color7  #8eaca5   # mist
color15 #ffffff   # ivory
