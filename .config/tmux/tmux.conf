# Indexing and session behavior
set -g base-index 1              # Start window numbering at 1.
setw -g pane-base-index 1        # Start pane numbering at 1.
set -g detach-on-destroy off     # Keep tmux running when a session closes.
set -g escape-time 0             # Remove escape-key delay.
set -g history-limit 1000000     # Keep a large scrollback history.
set -g set-clipboard on          # Sync copy operations with the system clipboard.

# Mouse and focus integration
set -g mouse on
set -g focus-events on           # Enable focus events for Neovim.

# Environment for popup tools and fzf
set-environment -g PATH "$HOME/.fzf/bin:$PATH"
set-environment -g FZF_DEFAULT_OPTS_FILE "$HOME/.config/theme/current_fzf"

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-features ',*:usstyle'
set -gq allow-passthrough all    # Allow passthrough features such as image rendering.
set -g visual-activity off

# Window title
set -g set-titles on
set -g set-titles-string "#S"

# Timing
set -g status-interval 1
set -g repeat-time 350
set -g display-time 1500

# Status bar sizing
set -g status-left-length 100
set -g status-right-length 100

# Window naming
set -wg automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},ssh},#[fg=cyan]@#[default],}#{pane_current_command}'

# Copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Custom keybindings
bind-key G run-shell "~/.config/scripts/open_github.sh"
bind-key -n S-F12 display-popup -E -b none "~/.config/theme/theme.sh"
bind f display-popup -E -w 100% -h 100% -b none "~/.config/scripts/tmux_sessions.sh"
bind h run-shell 'host="$(~/.config/scripts/tmux-ssh-host.sh "#{pane_pid}" "#{pane_current_command}")"; host="${host#@}"; if [ -n "$host" ]; then tmux new-window -c "#{pane_current_path}" "ssh $host"; else tmux display-message "No active SSH host found in current pane"; fi'
bind c run-shell '~/.config/scripts/tmux-smart-new-window.sh "#{pane_current_command}" "#{pane_pid}" "#{pane_current_path}"'
bind H display-popup -d "#{pane_current_path}" -x C -y C -w 70% -h 40% -E -b none "~/.config/scripts/remux.sh"
bind C new-window -c "#{pane_current_path}"
bind R source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"
bind % run-shell "~/.config/scripts/tmux-smart-split.sh h '#{pane_current_command}' '#{pane_pid}'"
bind \" run-shell "~/.config/scripts/tmux-smart-split.sh v '#{pane_current_command}' '#{pane_pid}'"

# Styling
set -g status-style bg=default,fg=default
set -g pane-border-style fg=default,bg=default
setw -g mode-style "fg=#000000,bg=#c3e1f9"
set -g message-style bg=default,fg=default
set -g message-command-style bg=default,fg=default
set -ag window-status-current-style bold

# Show the current SSH target when present, then a shortened pane path and clock.
set -g status-right '#[fg=cyan]#(~/.config/scripts/tmux-ssh-host.sh #{pane_pid} #{pane_current_command})#[default] #(~/.config/scripts/smart_path.sh "#{pane_current_path}") %H:%M %d-%b-%y'
