"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
format = '''
[┌\[](fg:default)$username@$hostname[\]-\(](fg:default)${custom.short_pwd}[\)](fg:default)(-[\[](fg:default)$git_branch$git_commit$git_status${custom.svn_relative_url}[\]](fg:default))
[└> ](fg:default)'''

[custom.short_pwd]
command = '''
path="$PWD"
prefix=""

if [[ "$path" == "$HOME"* ]]; then
    prefix="~"
    path="${path#"$HOME"}"
fi

IFS=/ read -r -a parts <<< "${path#/}"
out="$prefix"
last_index=$((${#parts[@]} - 1))

for i in "${!parts[@]}"; do
    part="${parts[$i]}"
    [[ -z "$part" ]] && continue

    if [[ $i -eq $last_index ]]; then
        out+="/$part"
    elif [[ $part == .* ]]; then
        out+="/${part:0:2}"
    else
        out+="/${part:0:1}"
    fi
done

[[ -z "$out" ]] && out="/"
printf '%s' "$out"
'''
format = '[$output]($style)'
shell = ['bash', '--noprofile', '--norc']
style = '#f3ad47'
when = 'true'

[git_branch]
format = '[git://](fg:default)[$branch](#f3ad47)'
symbol = ''

[git_commit]
commit_hash_length = 7
format = '[git:// ](fg:default)[$hash](#f43841)'
only_detached = true
tag_disabled = true

[git_metrics]
format = '\[[+$added]($added_style)\]\[[-$deleted]($deleted_style)\]'

[git_state]
format = '\[[$state ($progress_current/$progress_total)]($style)\]'

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
conflicted = '=${count}'
deleted = 'x${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
format = '([ $all_status$ahead_behind](#f43841))'
modified = '!${count}'
renamed = '»${count}'
staged = '+${count}'
stashed = '*${count}'
style = '#f43841'
untracked = '?${count}'

[custom.svn_relative_url]
command = '''
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    exit 0
fi

svn info --show-item relative-url 2>/dev/null | sed 's#^\^/##'
'''
format = '[svn://](fg:default)[$output](#f3ad47)'
shell = ['bash', '--noprofile', '--norc']
style = '#ffb347'
when = '''
if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    exit 1
fi

svn info --show-item relative-url >/dev/null 2>&1
'''

[hostname]
format = '[$ssh_symbol$hostname]($style)'
ssh_only = false
style = ''

[username]
format = '[$user]($style)'
show_always = true
style_root = ''
style_user = ''
