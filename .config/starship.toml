[custom.short_pwd]
command = '''
path="$PWD"
prefix=""

if [[ "$path" == "$HOME"* ]]; then
    prefix="~"
    path="${path#"$HOME"}"
fi

IFS=/ read -r -a parts <<< "${path#/}"
out="$prefix"
last_index=$((${#parts[@]} - 1))

for i in "${!parts[@]}"; do
    part="${parts[$i]}"
    [[ -z "$part" ]] && continue

    if [[ $i -eq $last_index ]]; then
        out+="/$part"
    elif [[ $part == .* ]]; then
        out+="/${part:0:2}"
    else
        out+="/${part:0:1}"
    fi
done

[[ -z "$out" ]] && out="/"
printf '%s' "$out"
'''
format = '[$output]($style)'
shell = ['bash', '--noprofile', '--norc']
style = 'bold #ff8700'
when = 'true'

