[gcloud]
format = '\[[$symbol$account(@$domain)(\($region\))]($style)\]'

[git_branch]
format = '[git:// ](bold bright-cyan)[$branch](bold #ffb347)'
symbol = ''

[git_commit]
commit_hash_length = 7
format = '[git:// ](bold bright-cyan)[$hash](bold #ffb347)'
only_detached = true
tag_disabled = true

[git_metrics]
format = '\[[+$added]($added_style)\]\[[-$deleted]($deleted_style)\]'

[git_state]
format = '\[[$state ($progress_current/$progress_total)]($style)\]'

[git_status]
ahead = '⇡${count}'
behind = '⇣${count}'
conflicted = '=${count}'
deleted = 'x${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
format = '([ $all_status$ahead_behind](bold red))'
modified = '!${count}'
renamed = '»${count}'
staged = '+${count}'
stashed = '*${count}'
style = 'bold red'
untracked = '?${count}'

